<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>landing-athlete | one more</title>
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css?v=4" />
  <!-- Mustache.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/mustache@4.2.0/mustache.min.js"></script>
  <!-- Data store -->
  <script src="/content.js"></script>
</head>
<body data-page="landing-athlete">
<!-- Google Tag Manager (noscript) -->
<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WNM4876N"
height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
<!-- End Google Tag Manager (noscript) -->

  <!-- HEADER rendered by Mustache -->
  <div id="header-mount"></div>
  <script type="text/x-mustache" data-target="header-mount">

<header id="site-header" class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 bg-transparent">
  <nav class="container-padding">
    <div class="flex items-center justify-between h-20 lg:h-24 w-full">
      <a href="/index.html" class="font-serif text-xl lg:text-2xl tracking-tight text-foreground hover:opacity-70 transition-opacity mr-10">{{site.brand}}</a>
      <div class="hidden lg:flex items-center gap-10 lg:gap-14 ml-auto">
        {{#nav.links}}
        <a href="{{href}}" class="nav-link text-sm tracking-wide transition-all duration-300 hover:opacity-60 text-muted-foreground">{{label}}</a>
                {{/nav.links}}
        <button class="nav-link text-sm tracking-wide transition-all duration-300 hover:opacity-60 text-muted-foreground cart-btn-desktop" aria-label="cart">cart (<span class="cart-count">0</span>)</button>
      </div>
      <!-- Mobile menu button -->
      <div class="lg:hidden flex items-center gap-4">
        <button class="nav-link text-sm tracking-wide text-foreground cart-btn-mobile" aria-label="cart">cart (<span class="cart-count">0</span>)</button>
        <button id="mobile-menu-btn" class="text-foreground flex flex-col gap-1.5 focus:outline-none p-1" aria-label="menu">
          <span class="block w-5 h-0.5 bg-foreground rounded-full"></span>
          <span class="block w-5 h-0.5 bg-foreground rounded-full"></span>
        </button>
      </div>
    </div>
  </nav>
  <!-- Mobile Menu Overlay -->
  <div id="mobile-menu" class="mobile-menu-overlay lg:hidden">
    <div class="flex justify-between items-center mb-12">
      <a href="/index.html" class="font-serif text-2xl text-foreground tracking-tight hover:opacity-70 transition-opacity">{{site.brand}}</a>
      <button id="close-mobile-menu" class="text-foreground p-2 focus:outline-none" aria-label="close menu">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>
    </div>
    <nav class="flex flex-col gap-8 text-2xl font-serif text-foreground">
      {{#nav.links}}
      <a href="{{href}}" class="hover:opacity-70 transition-colors">{{label}}</a>
      {{/nav.links}}
    </nav>
  </div>
</header>
  </script>

  <!-- PAGE CONTENT -->
  
  <main>

    <div id="page-content"></div>
    <script type="text/x-mustache" data-target="page-content">
    <section class="relative min-h-screen flex items-center bg-foreground text-background">
      <div class="absolute inset-0 z-0 bg-foreground/90">
        <img src="{{pageData.hero.img}}" alt="{{pageData.hero.imgAlt}}" class="w-full h-full object-cover mix-blend-multiply opacity-50" />
      </div>
      <div class="relative z-10 container-padding w-full text-center">
        <p class="eyebrow text-background/60 tracking-[0.2em] mb-10">{{pageData.hero.eyebrow}}</p>
        <h1 class="font-serif text-6xl md:text-8xl mb-8 text-background">{{pageData.hero.headline}}</h1>
        <p class="text-xl max-w-2xl mx-auto mb-12 text-background/80 leading-relaxed">{{pageData.hero.body}}</p>
        <a href="{{pageData.hero.ctaHref}}" class="btn-primary" style="background: hsl(var(--background)); color: hsl(var(--foreground));">{{pageData.hero.ctaText}}</a>
      </div>
    </section>
    </script>

  </main>


  <!-- FOOTER rendered by Mustache -->
  <div id="footer-mount"></div>
  <script type="text/x-mustache" data-target="footer-mount">

<footer class="bg-cream-dark border-t border-border">
  <div class="container-padding section-padding py-20 lg:py-28">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12 lg:gap-8">
      <div class="lg:col-span-1">
        <a href="/index.html" class="font-serif text-2xl tracking-tight text-foreground">{{site.brand}}</a>
        <p class="mt-4 text-sm text-muted-foreground leading-relaxed max-w-xs">
          {{footer.tagline1}}<br>{{footer.tagline2}}
        </p>
      </div>
      <div>
        <h4 class="text-sm font-medium text-foreground mb-4">shop</h4>
        <ul class="space-y-3">
          {{#footer.shopLinks}}<li><a href="{{href}}" class="text-sm text-muted-foreground hover:text-foreground transition-colors">{{label}}</a></li>{{/footer.shopLinks}}
        </ul>
      </div>
      <div>
        <h4 class="text-sm font-medium text-foreground mb-4">company</h4>
        <ul class="space-y-3">
          {{#footer.companyLinks}}<li><a href="{{href}}" class="text-sm text-muted-foreground hover:text-foreground transition-colors">{{label}}</a></li>{{/footer.companyLinks}}
        </ul>
      </div>
      <div>
        <h4 class="text-sm font-medium text-foreground mb-4">legal</h4>
        <ul class="space-y-3">
          {{#footer.legalLinks}}<li><a href="{{href}}" class="text-sm text-muted-foreground hover:text-foreground transition-colors">{{label}}</a></li>{{/footer.legalLinks}}
        </ul>
      </div>
    </div>
    <div class="mt-12 pt-8 border-t border-border flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 w-full max-w-[100%] overflow-hidden">
      <p class="text-xs text-muted-foreground">{{footer.copyright}}</p>
      <p class="text-xs text-muted-foreground italic">always room for one more.</p>
    </div>
  </div>
</footer>
  </script>

  <!-- Scripts -->
  <script src="/js/main.js"></script>


</body>
</html>
